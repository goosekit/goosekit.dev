<main>
  <h1>📐 Unit Converter</h1>
  <p class="subtitle">Convert between units of length, weight, temperature, area, volume, speed & data.</p>

  <div class="categories" id="categories"></div>

  <div class="converter">
    <div class="input-group">
      <label>From</label>
      <div class="input-row">
        <input type="number" id="fromValue" value="1" oninput="convert()" />
        <select id="fromUnit" onchange="convert()"></select>
      </div>
    </div>
    <button class="swap-btn" onclick="swap()" title="Swap">⇅</button>
    <div class="input-group">
      <label>To</label>
      <div class="input-row">
        <input type="number" id="toValue" readonly />
        <select id="toUnit" onchange="convert()"></select>
      </div>

<script>
const UNITS = {
  Length: {
    meter: 1, kilometer: 1000, centimeter: 0.01, millimeter: 0.001,
    mile: 1609.344, yard: 0.9144, foot: 0.3048, inch: 0.0254,
    nautical_mile: 1852, micrometer: 1e-6
  },
  Weight: {
    kilogram: 1, gram: 0.001, milligram: 1e-6, metric_ton: 1000,
    pound: 0.453592, ounce: 0.0283495, stone: 6.35029, short_ton: 907.185
  },
  Temperature: { celsius: 'C', fahrenheit: 'F', kelvin: 'K' },
  Area: {
    sq_meter: 1, sq_kilometer: 1e6, sq_mile: 2589988.11, sq_yard: 0.836127,
    sq_foot: 0.092903, sq_inch: 0.00064516, hectare: 10000, acre: 4046.86
  },
  Volume: {
    liter: 1, milliliter: 0.001, cubic_meter: 1000, gallon_us: 3.78541,
    quart_us: 0.946353, pint_us: 0.473176, cup_us: 0.236588,
    fl_oz_us: 0.0295735, tablespoon: 0.0147868, teaspoon: 0.00492892
  },
  Speed: {
    m_per_s: 1, km_per_h: 0.277778, mph: 0.44704, knot: 0.514444, ft_per_s: 0.3048
  },
  Data: {
    byte: 1, kilobyte: 1024, megabyte: 1048576, gigabyte: 1073741824,
    terabyte: 1099511627776, petabyte: 1125899906842624,
    bit: 0.125, kilobit: 128, megabit: 131072, gigabit: 134217728
  }
};

let currentCat = 'Length';

function initCategories() {
  const el = document.getElementById('categories');
  el.innerHTML = Object.keys(UNITS).map(c =>
    `<button class="cat-btn${c === currentCat ? ' active' : ''}" onclick="switchCategory('${c}')">${getCatIcon(c)} ${c}</button>`
  ).join('');
}

function getCatIcon(c) {
  return { Length:'📏', Weight:'⚖️', Temperature:'🌡️', Area:'📐', Volume:'🧪', Speed:'🏎️', Data:'💾' }[c] || '';
}

function switchCategory(cat) {
  currentCat = cat;
  initCategories();
  populateSelects();
  convert();
}

function populateSelects() {
  const units = Object.keys(UNITS[currentCat]);
  const fromSel = document.getElementById('fromUnit');
  const toSel = document.getElementById('toUnit');
  const opts = units.map(u => `<option value="${u}">${formatUnitName(u)}</option>`).join('');
  fromSel.innerHTML = opts;
  toSel.innerHTML = opts;
  if (units.length > 1) toSel.selectedIndex = 1;
}

function formatUnitName(u) {
  return u.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

function convertTemp(val, from, to) {
  // Convert to celsius first
  let c;
  if (from === 'celsius') c = val;
  else if (from === 'fahrenheit') c = (val - 32) * 5/9;
  else c = val - 273.15;
  // Convert from celsius
  if (to === 'celsius') return c;
  if (to === 'fahrenheit') return c * 9/5 + 32;
  return c + 273.15;
}

function convertValue(val, from, to) {
  if (currentCat === 'Temperature') return convertTemp(val, from, to);
  const factors = UNITS[currentCat];
  return val * factors[from] / factors[to];
}

function convert() {
  const val = parseFloat(document.getElementById('fromValue').value) || 0;
  const from = document.getElementById('fromUnit').value;
  const to = document.getElementById('toUnit').value;
  const result = convertValue(val, from, to);
  document.getElementById('toValue').value = smartFormat(result);

  // Formula
  if (currentCat === 'Temperature') {
    document.getElementById('formula').textContent = `${val} ${formatUnitName(from)} = ${smartFormat(result)} ${formatUnitName(to)}`;
  } else {
    const factor = UNITS[currentCat][from] / UNITS[currentCat][to];
    document.getElementById('formula').textContent = `1 ${formatUnitName(from)} = ${smartFormat(factor)} ${formatUnitName(to)}`;
  }

  // All conversions
  const units = Object.keys(UNITS[currentCat]);
  const grid = document.getElementById('allResults');
  grid.innerHTML = units.map(u => {
    const r = convertValue(val, from, u);
    return `<div class="result-item" onclick="copyVal('${smartFormat(r)} ${formatUnitName(u)}')">
      <span class="unit">${formatUnitName(u)}</span>
      <span class="val">${smartFormat(r)}</span>
    </div>`;
  }).join('');
}

function swap() {
  const fromSel = document.getElementById('fromUnit');
  const toSel = document.getElementById('toUnit');
  const tmp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = tmp;
  convert();
}

function smartFormat(n) {
  if (Math.abs(n) === 0) return '0';
  if (Math.abs(n) >= 1e12) return n.toExponential(4);
  if (Math.abs(n) < 0.0001) return n.toExponential(4);
  return parseFloat(n.toPrecision(10)).toString();
}

function copyVal(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById('toast');
  t.textContent = 'Copied!'; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

initCategories();
populateSelects();
convert();
</script>
