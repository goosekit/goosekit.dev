<script>
const COLORS = [
  '#a78bfa','#34d399','#f472b6','#fbbf24','#60a5fa',
  '#f87171','#2dd4bf','#ff4800','#a3e635','#e879f9',
  '#38bdf8','#facc15','#4ade80','#f43f5e','#818cf8'
];

let chartInstance = null;
let currentType = 'bar';
let rowData = [];

function getColor(i) { return COLORS[i % COLORS.length]; }

function addRow(label, value, color) {
  const idx = rowData.length;
  rowData.push({
    label: label || '',
    value: value ?? '',
    color: color || getColor(idx)
  });
  renderTable();
  updateChart();
}

function removeRow(i) {
  rowData.splice(i, 1);
  renderTable();
  updateChart();
}

function renderTable() {
  const tbody = document.getElementById('dataBody');
  tbody.innerHTML = '';
  rowData.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${esc(r.label)}" data-i="${i}" data-f="label" placeholder="Label ${i+1}"></td>
      <td><input type="number" value="${r.value}" data-i="${i}" data-f="value" step="any" placeholder="0"></td>
      <td class="td-color"><input type="color" value="${r.color}" data-i="${i}" data-f="color"></td>
      <td class="td-action"><button class="btn-remove" onclick="removeRow(${i})" title="Remove">×</button></td>
    `;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = +e.target.dataset.i;
      const field = e.target.dataset.f;
      rowData[idx][field] = field === 'value' ? parseFloat(e.target.value) || 0 : e.target.value;
      updateChart();
    });
  });
}

function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function clearData() {
  rowData = [];
  renderTable();
  updateChart();
}

function loadSample() {
  rowData = [];
  const samples = [
    ['January', 65], ['February', 42], ['March', 78],
    ['April', 91], ['May', 55], ['June', 70]
  ];
  samples.forEach(([l,v], i) => {
    rowData.push({ label: l, value: v, color: getColor(i) });
  });
  renderTable();
  updateChart();
}

function updateChart() {
  const labels = rowData.map(r => r.label || '(empty)');
  const values = rowData.map(r => parseFloat(r.value) || 0);
  const colors = rowData.map(r => r.color);

  const title = document.getElementById('chartTitle').value;
  const xLabel = document.getElementById('xLabel').value;
  const yLabel = document.getElementById('yLabel').value;
  const legendPos = document.getElementById('legendPos').value;
  const isPolar = currentType === 'pie' || currentType === 'doughnut';

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById('chartCanvas').getContext('2d');

  const config = {
    type: currentType,
    data: {
      labels: labels,
      datasets: [{
        label: title || 'Dataset',
        data: values,
        backgroundColor: isPolar ? colors : colors.map(c => c + 'cc'),
        borderColor: isPolar ? '#161625' : colors,
        borderWidth: isPolar ? 2 : 2,
        tension: 0.3,
        fill: currentType === 'line' ? false : undefined,
        pointBackgroundColor: colors,
        pointRadius: currentType === 'line' ? 5 : undefined,
        pointHoverRadius: currentType === 'line' ? 7 : undefined,
        borderRadius: currentType === 'bar' ? 6 : undefined,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      animation: { duration: 400 },
      plugins: {
        title: {
          display: !!title,
          text: title,
          color: '#e0e0e0',
          font: { size: 18, weight: '600' },
          padding: { bottom: 16 }
        },
        legend: {
          display: legendPos !== 'none',
          position: legendPos === 'none' ? 'top' : legendPos,
          labels: { color: '#9999bb', padding: 12, usePointStyle: true, pointStyle: 'circle' }
        },
        tooltip: {
          backgroundColor: '#1a1a30',
          titleColor: '#e0e0e0',
          bodyColor: '#c0c0d0',
          borderColor: '#2a2a4a',
          borderWidth: 1,
          cornerRadius: 8,
          padding: 10
        }
      },
      scales: isPolar ? {} : {
        x: {
          title: { display: !!xLabel, text: xLabel, color: '#9999bb', font: { size: 13 } },
          ticks: { color: '#7777aa' },
          grid: { color: '#1e1e35' }
        },
        y: {
          title: { display: !!yLabel, text: yLabel, color: '#9999bb', font: { size: 13 } },
          ticks: { color: '#7777aa' },
          grid: { color: '#1e1e35' },
          beginAtZero: true
        }
      }
    }
  };

  chartInstance = new Chart(ctx, config);
}

function exportPNG() {
  if (!chartInstance) return;
  const bgColor = document.getElementById('bgColor').value;
  const canvas = document.getElementById('chartCanvas');
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  if (bgColor !== 'transparent') {
    tempCtx.fillStyle = bgColor;
    tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
  }
  tempCtx.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'chart.png';
  link.href = tempCanvas.toDataURL('image/png');
  link.click();
}

// Chart type buttons
document.querySelectorAll('.chart-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    updateChart();
  });
});

// Live settings update
['chartTitle','xLabel','yLabel','legendPos','bgColor'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateChart);
  document.getElementById(id).addEventListener('change', updateChart);
});

// Init with sample data
loadSample();
</script>
</body>
</html>
