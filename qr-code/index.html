<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator — Free Online QR Code Maker</title>
  <meta name="description" content="Generate QR codes instantly. Supports URLs, text, WiFi, email, phone. Download as PNG or SVG. Free, no signup, no tracking." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://arthurpierrey.github.io/qrcode/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="QR Code Generator — Free Online QR Code Maker" />
  <meta property="og:description" content="Generate QR codes instantly. Download as PNG or SVG. Free, no signup." />
  <meta property="og:url" content="https://arthurpierrey.github.io/qrcode/" />
  <meta name="twitter:card" content="summary" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "QR Code Generator",
    "url": "https://arthurpierrey.github.io/qrcode/",
    "description": "Generate QR codes for URLs, text, WiFi, email, and phone. Download as PNG or SVG.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Person", "name": "Arthur Pierrey" }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0a0a0a; --bg-secondary: #1a1a1a; --bg-tertiary: #2a2a2a;
      --accent: #3b82f6; --accent-hover: #2563eb; --accent-glow: rgba(59,130,246,0.15);
      --text-primary: #e5e5e5; --text-secondary: #a3a3a3; --text-muted: #737373;
      --border: #333; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .tab:hover { border-color: var(--accent); color: var(--text-primary); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; font-weight: 500; }
    input, textarea, select { width: 100%; padding: 0.75rem 1rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea { resize: vertical; min-height: 80px; }
    .form-group { margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-group { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
    .qr-output { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    #qr-canvas { background: #fff; border-radius: var(--radius-sm); padding: 16px; }
    .options-row { display: flex; gap: 1rem; align-items: end; flex-wrap: wrap; }
    .options-row .form-group { flex: 1; min-width: 120px; }
    .color-input-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .color-input-wrap input[type="color"] { width: 40px; height: 40px; padding: 2px; border-radius: 6px; cursor: pointer; }
    .color-input-wrap input[type="text"] { flex: 1; }
    .hidden { display: none; }
    .badge { display: inline-block; background: var(--accent-glow); color: var(--accent); padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 QR Code Generator</h1>
    <p class="subtitle">Generate QR codes for URLs, text, WiFi, email & more — download as PNG or SVG</p>

    <div class="card">
      <div class="tabs" id="tabs">
        <button class="tab active" data-type="url">🔗 URL</button>
        <button class="tab" data-type="text">📝 Text</button>
        <button class="tab" data-type="wifi">📶 WiFi</button>
        <button class="tab" data-type="email">✉️ Email</button>
        <button class="tab" data-type="phone">📞 Phone</button>
        <button class="tab" data-type="vcard">👤 vCard</button>
      </div>

      <!-- URL -->
      <div id="form-url" class="type-form">
        <div class="form-group">
          <label for="input-url">URL</label>
          <input type="url" id="input-url" placeholder="https://example.com" value="https://goosekit.dev" />
        </div>
      </div>

      <!-- Text -->
      <div id="form-text" class="type-form hidden">
        <div class="form-group">
          <label for="input-text">Text</label>
          <textarea id="input-text" placeholder="Enter any text..."></textarea>
        </div>
      </div>

      <!-- WiFi -->
      <div id="form-wifi" class="type-form hidden">
        <div class="form-group"><label for="wifi-ssid">Network Name (SSID)</label><input id="wifi-ssid" placeholder="MyNetwork" /></div>
        <div class="form-row">
          <div class="form-group"><label for="wifi-pass">Password</label><input id="wifi-pass" type="password" placeholder="Password" /></div>
          <div class="form-group"><label for="wifi-enc">Encryption</label>
            <select id="wifi-enc"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div id="form-email" class="type-form hidden">
        <div class="form-group"><label for="email-to">To</label><input id="email-to" type="email" placeholder="hello@example.com" /></div>
        <div class="form-group"><label for="email-subj">Subject</label><input id="email-subj" placeholder="Subject line" /></div>
        <div class="form-group"><label for="email-body">Body</label><textarea id="email-body" placeholder="Message body..."></textarea></div>
      </div>

      <!-- Phone -->
      <div id="form-phone" class="type-form hidden">
        <div class="form-group"><label for="input-phone">Phone Number</label><input id="input-phone" type="tel" placeholder="+1234567890" /></div>
      </div>

      <!-- vCard -->
      <div id="form-vcard" class="type-form hidden">
        <div class="form-row">
          <div class="form-group"><label for="vc-fn">First Name</label><input id="vc-fn" placeholder="John" /></div>
          <div class="form-group"><label for="vc-ln">Last Name</label><input id="vc-ln" placeholder="Doe" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="vc-phone">Phone</label><input id="vc-phone" placeholder="+1234567890" /></div>
          <div class="form-group"><label for="vc-email">Email</label><input id="vc-email" placeholder="john@example.com" /></div>
        </div>
        <div class="form-group"><label for="vc-org">Organization</label><input id="vc-org" placeholder="Company Inc." /></div>
        <div class="form-group"><label for="vc-url">Website</label><input id="vc-url" placeholder="https://example.com" /></div>
      </div>
    </div>

    <div class="card">
      <div class="options-row">
        <div class="form-group">
          <label for="qr-size">Size</label>
          <select id="qr-size">
            <option value="200">200×200</option>
            <option value="300" selected>300×300</option>
            <option value="400">400×400</option>
            <option value="600">600×600</option>
            <option value="800">800×800</option>
            <option value="1024">1024×1024</option>
          </select>
        </div>
        <div class="form-group">
          <label for="qr-ecl">Error Correction</label>
          <select id="qr-ecl">
            <option value="L">Low (7%)</option>
            <option value="M" selected>Medium (15%)</option>
            <option value="Q">Quartile (25%)</option>
            <option value="H">High (30%)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Foreground</label>
          <div class="color-input-wrap">
            <input type="color" id="qr-fg" value="#000000" />
            <input type="text" id="qr-fg-text" value="#000000" style="max-width:100px" />
          </div>
        </div>
        <div class="form-group">
          <label>Background</label>
          <div class="color-input-wrap">
            <input type="color" id="qr-bg" value="#ffffff" />
            <input type="text" id="qr-bg-text" value="#ffffff" style="max-width:100px" />
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="generate-btn">⚡ Generate QR Code</button>
      </div>
    </div>

    <div class="card">
      <div class="qr-output">
        <canvas id="qr-canvas" width="300" height="300"></canvas>
        <div class="btn-group">
          <button class="btn btn-primary" id="dl-png">📥 Download PNG</button>
          <button class="btn btn-secondary" id="dl-svg">📥 Download SVG</button>
          <button class="btn btn-secondary" id="copy-btn">📋 Copy to Clipboard</button>
        </div>
      </div>
    </div>

    <footer>
      <p style="color:var(--text-muted);font-size:0.85rem;">
        Part of <a href="https://goosekit.dev">GooseKit</a> — Free developer tools, no signup, no tracking
      </p>
    </footer>
  </div>

  // App logic
  const $ = s => document.querySelector(s);
  let currentType = 'url';

  // Tabs
  $('#tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    document.querySelectorAll('.type-form').forEach(f => f.classList.add('hidden'));
    $(`#form-${currentType}`).classList.remove('hidden');
  });

  // Color sync
  function syncColor(colorId, textId) {
    $(colorId).addEventListener('input', () => { $(textId).value = $(colorId).value; });
    $(textId).addEventListener('input', () => { if (/^#[0-9a-f]{6}$/i.test($(textId).value)) $(colorId).value = $(textId).value; });
  }
  syncColor('#qr-fg', '#qr-fg-text');
  syncColor('#qr-bg', '#qr-bg-text');

  function getData() {
    switch (currentType) {
      case 'url': return $('#input-url').value || 'https://example.com';
      case 'text': return $('#input-text').value || 'Hello World';
      case 'wifi': {
        const s = $('#wifi-ssid').value, p = $('#wifi-pass').value, e = $('#wifi-enc').value;
        return `WIFI:T:${e};S:${s};P:${p};;`;
      }
      case 'email': {
        const t = $('#email-to').value, s = $('#email-subj').value, b = $('#email-body').value;
        return `mailto:${t}?subject=${encodeURIComponent(s)}&body=${encodeURIComponent(b)}`;
      }
      case 'phone': return `tel:${$('#input-phone').value}`;
      case 'vcard': {
        const fn = $('#vc-fn').value, ln = $('#vc-ln').value;
        return `BEGIN:VCARD\nVERSION:3.0\nN:${ln};${fn}\nFN:${fn} ${ln}\nTEL:${$('#vc-phone').value}\nEMAIL:${$('#vc-email').value}\nORG:${$('#vc-org').value}\nURL:${$('#vc-url').value}\nEND:VCARD`;
      }
    }
  }

  function generate() {
    const data = getData();
    const size = parseInt($('#qr-size').value);
    const ecl = $('#qr-ecl').value;
    const fg = $('#qr-fg').value;
    const bg = $('#qr-bg').value;

    const qr = qrcode(0, ecl);
    qr.addData(data);
    qr.make();

    const canvas = $('#qr-canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const mc = qr.getModuleCount();
    const margin = 4;
    const cellSize = (size - margin * 2) / mc;

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = fg;

    for (let r = 0; r < mc; r++) {
      for (let c = 0; c < mc; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(margin + c * cellSize, margin + r * cellSize, cellSize, cellSize);
        }
      }
    }
  }

  $('#generate-btn').addEventListener('click', generate);

  // Auto-generate on input change
  document.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('input', () => { clearTimeout(window._qrTimer); window._qrTimer = setTimeout(generate, 300); });
  });

  // Download PNG
  $('#dl-png').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = $('#qr-canvas').toDataURL('image/png');
    link.click();
  });

  // Download SVG
  $('#dl-svg').addEventListener('click', () => {
    const data = getData();
    const ecl = $('#qr-ecl').value;
    const fg = $('#qr-fg').value;
    const bg = $('#qr-bg').value;
    const size = parseInt($('#qr-size').value);

    const qr = qrcode(0, ecl);
    qr.addData(data);
    qr.make();

    const svg = qr.createSvgTag({ cellSize: Math.floor(size / (qr.getModuleCount() + 8)), margin: 4 * Math.floor(size / (qr.getModuleCount() + 8)), fg, bg });
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'qrcode.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
  });

  // Copy to clipboard
  $('#copy-btn').addEventListener('click', async () => {
    try {
      const canvas = $('#qr-canvas');
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      const btn = $('#copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
    } catch { alert('Copy failed — try downloading instead'); }
  });

  // Initial generate
  generate();
  </script>
</body>
