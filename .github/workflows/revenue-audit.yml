name: Revenue Audit

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/**'
  pull_request:
    paths:
      - '**.html'
      - 'scripts/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run revenue paths audit
        run: bash scripts/audit_revenue_paths.sh
