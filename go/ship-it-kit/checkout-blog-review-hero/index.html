  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var checkoutUrl = 'https://shipitstudio.lemonsqueezy.com/checkout/buy/66928c03-2807-4c41-aa34-69cfdb6ae07a';
      var params = new URLSearchParams(window.location.search);
      var source = params.get('source') || 'ship_it_kit_review_hero';
      var capture = function (eventName, props) {
        if (window.posthog && typeof window.posthog.capture === 'function') {
          window.posthog.capture(eventName, props || {});

      };
      capture('ship_it_kit_checkout_redirect_viewed', { source: source, product: 'ship_it_kit', path: window.location.pathname });
      var manual = document.querySelector('[data-manual-checkout-link]');
      if (manual) manual.addEventListener('click', function () { capture('ship_it_kit_checkout_manual_click', { source: source, product: 'ship_it_kit' }); });
      setTimeout(function () {
        capture('ship_it_kit_checkout_redirected', { source: source, product: 'ship_it_kit' });

    });
