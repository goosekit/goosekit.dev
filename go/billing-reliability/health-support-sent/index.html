<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Billing-health request sent</title>
  <script defer src="/posthog.js"></script>
  <link rel="stylesheet" href="/brand/goosekit-fonts.css?v=20260501-fonts1">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8f2;background:#0f0f19}.card{max-width:680px;padding:28px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(24,24,37,.9);text-align:center}.pill{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,72,0,.12);border:1px solid rgba(255,72,0,.24);color:#ffbf9f;font-weight:800;margin-bottom:16px}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 16px;background:#ff4800;color:white;font-weight:800;text-decoration:none;margin-top:16px}.fine{color:#b8b8cc;font-size:.94rem}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Request sent</div>
    <h1>Your billing-health support request was sent</h1>
    <p>Arthur should receive the packet by email. Monthly support still needs a concrete first-pass fit check before anything is counted as MRR.</p>
    <a class="btn" href="/billing-health-support/">Back to billing-health support</a>
    <p class="fine">No payment is due here.</p>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      if (window.posthog && typeof window.posthog.capture === 'function') {
        window.posthog.capture('billing_health_request_formspree_returned', {
          product: 'billing_reliability',
          location: 'billing_health_request_sent_route',
          path: '/go/billing-reliability/health-support-sent/',
          source_ref: params.get('source') || 'formspree_return',
          request_context: 'billing_health_support',
          price_range_eur: '29/mo',
          price_eur_monthly: 29,
          target_href: window.location.href
        });
      }
    });
  </script>
</body>
</html>
