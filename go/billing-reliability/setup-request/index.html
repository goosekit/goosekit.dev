<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Opening setup help request…</title>
  <script defer src="/posthog.js"></script>
  <link rel="stylesheet" href="/brand/goosekit-fonts.css?v=20260501-fonts1">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8f2;background:#0f0f19}.card{max-width:620px;padding:28px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(24,24,37,.9);text-align:center}.pill{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,72,0,.12);border:1px solid rgba(255,72,0,.24);color:#ffbf9f;font-weight:800;margin-bottom:16px}a{color:#ff9040;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Next.js + Supabase + Stripe</div>
    <h1>Opening your setup request…</h1>
    <p>If your email app does not open automatically, use the link below.</p>
    <p><a href="#" data-manual-link="true">Write the setup request</a></p>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var source = params.get('source') || params.get('ref') || 'setup_request_route';
      var mailto = 'mailto:arthur.pierrey@gmail.com?subject=Next.js%20Supabase%20Stripe%20setup%20help&body=Hi%20Arthur%2C%0A%0AI%20need%20Next.js%20%2B%20Supabase%20%2B%20Stripe%20setup%20help.%0A%0AMy%20current%20stack%3A%0AMy%20repo%20state%3A%0AWhat%20is%20broken%20or%20missing%3A%0AProduction%20URL%20%2F%20repo%20access%20situation%3A%0ADebug%20artifacts%20I%20can%20send%20%28logs%2C%20screenshots%2C%20settings%2C%20file%20paths%29%3A%0ADeadline%3A%0ABudget%20range%20if%20any%3A%0A%0ASource%3A%20' + encodeURIComponent(source);
      function capture(name, props) {
        if (window.posthog && typeof window.posthog.capture === 'function') window.posthog.capture(name, props || {});
      }
      capture('setup_help_request_route_viewed', { source: source, product: 'billing_reliability', price_range_eur: '99-149' });
      var manual = document.querySelector('[data-manual-link]');
      manual.href = mailto;
      manual.addEventListener('click', function () {
        capture('setup_help_request_manual_click', { source: source, product: 'billing_reliability', price_range_eur: '99-149' });
      });
      setTimeout(function () {
        capture('setup_help_request_mailto_opened', { source: source, product: 'billing_reliability', price_range_eur: '99-149' });
        window.location.href = mailto;
      }, 420);
    });
  </script>
</body>
</html>
