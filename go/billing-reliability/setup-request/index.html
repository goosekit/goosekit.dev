<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Opening setup help request…</title>
  <script defer src="/posthog.js"></script>
  <link rel="stylesheet" href="/brand/goosekit-fonts.css?v=20260501-fonts1">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8f2;background:#0f0f19}.card{max-width:620px;padding:28px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(24,24,37,.9);text-align:center}.pill{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,72,0,.12);border:1px solid rgba(255,72,0,.24);color:#ffbf9f;font-weight:800;margin-bottom:16px}a{color:#ff9040;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Next.js + Supabase + Stripe</div>
    <h1>Opening your setup request…</h1>
    <p>If your email app does not open automatically, use the link below.</p>
    <p><a href="#" data-manual-link="true">Write the setup request</a></p>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var source = params.get('source') || params.get('ref') || 'setup_request_route';
      var isShipItKit = source.indexOf('shipit_setup_help_') === 0;
      var context = isShipItKit ? 'ship_it_kit_setup_help' : 'nextjs_supabase_stripe_setup_help';
      var priceRange = isShipItKit ? '199-plus' : '99-149';
      var subject = isShipItKit ? 'Ship It Kit setup help request' : 'Next.js Supabase Stripe setup help';
      var intro = isShipItKit
        ? 'I need help adapting Ship It Kit to my Next.js + Supabase + Stripe repo.'
        : 'I need Next.js + Supabase + Stripe setup help.';
      var body = [
        'Hi Arthur,',
        '',
        intro,
        '',
        'My current stack:',
        'My repo state:',
        isShipItKit ? 'Have I bought Ship It Kit yet:' : 'What is broken or missing:',
        isShipItKit ? 'What I need adapted from Ship It Kit:' : 'Production URL / repo access situation:',
        isShipItKit ? 'Exact blocker or launch risk:' : 'Debug artifacts I can send (logs, screenshots, settings, file paths):',
        isShipItKit ? 'Debug artifacts I can send (logs, screenshots, settings, file paths):' : 'Deadline:',
        isShipItKit ? 'Production URL / repo access situation:' : 'Budget range if any:',
        isShipItKit ? 'Deadline:' : '',
        isShipItKit ? 'Budget range if any:' : '',
        '',
        'Source: ' + source,
        'Request context: ' + context
      ].filter(function (line, index, lines) {
        return line !== '' || lines[index - 1] !== '';
      }).join('\n');
      var mailto = 'mailto:arthur.pierrey@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
      function capture(name, props) {
        if (window.posthog && typeof window.posthog.capture === 'function') window.posthog.capture(name, props || {});
      }
      capture('setup_help_request_route_viewed', { source: source, request_context: context, product: 'billing_reliability', price_range_eur: priceRange });
      var manual = document.querySelector('[data-manual-link]');
      manual.href = mailto;
      manual.addEventListener('click', function () {
        capture('setup_help_request_manual_click', { source: source, request_context: context, product: 'billing_reliability', price_range_eur: priceRange });
      });
      setTimeout(function () {
        capture('setup_help_request_mailto_opened', { source: source, request_context: context, product: 'billing_reliability', price_range_eur: priceRange });
        window.location.href = mailto;
      }, 420);
    });
  </script>
</body>
</html>
