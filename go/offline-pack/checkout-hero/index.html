<div style="max-width:560px;text-align:center;">
    <div style="display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,72,0,0.12);border:1px solid rgba(255,72,0,0.24);color:#ffbf9f;font-weight:700;margin-bottom:16px;">Goosekit Offline Pack</div>
    <h1 style="margin:0 0 12px;font-size:2rem;">Redirecting to checkout…</h1>
    <p style="margin:0 0 16px;color:#9fb0c9;line-height:1.6;">If nothing happens automatically, use the link below.</p>
    <p style="margin:0;"><a href="https://shipitstudio.lemonsqueezy.com/checkout/buy/f897713c-9cd2-4aaa-bd95-abd5ecd6b757" data-manual-checkout-link="true" style="color:#ff4800;font-weight:700;text-decoration:none;">Continue to checkout →</a></p>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var checkoutUrl = 'https://shipitstudio.lemonsqueezy.com/checkout/buy/f897713c-9cd2-4aaa-bd95-abd5ecd6b757';
      var params = new URLSearchParams(window.location.search);
      var source = params.get('source') || 'offline_pack_hero';
      var capture = function (eventName, props) {
        if (window.posthog && typeof window.posthog.capture === 'function') {
          window.posthog.capture(eventName, props || {});
        }
      };

      capture('offline_pack_checkout_redirect_viewed', {
        source: source,
        path: window.location.pathname,
        product: 'offline_pack'
      });

      var manual = document.querySelector('[data-manual-checkout-link]');
      if (manual) {
        manual.addEventListener('click', function () {
          capture('offline_pack_checkout_manual_click', {
            source: source,
            product: 'offline_pack'
          });
        });
      }

      capture('offline_pack_checkout_redirected', {
        source: source,
        product: 'offline_pack'
      });
      var glue = checkoutUrl.indexOf('?') === -1 ? '?' : '&';
      window.location.replace(checkoutUrl + glue + params.toString());
    });
  </script>
