<script>
(function(){
  // --- State ---
  let mode = 'stopwatch';
  let running = false;
  let elapsed = 0;        // ms for stopwatch
  let remaining = 0;      // ms for timer
  let timerTotal = 0;
  let startTs = 0;
  let rafId = null;
  let laps = [];
  let lastLapElapsed = 0;
  let audioCtx = null;

  // --- DOM ---
  const display = document.getElementById('display');
  const btnStart = document.getElementById('btnStart');
  const btnReset = document.getElementById('btnReset');
  const btnLap = document.getElementById('btnLap');
  const timerInput = document.getElementById('timerInput');
  const lapsSection = document.getElementById('lapsSection');
  const lapList = document.getElementById('lapList');
  const alertOverlay = document.getElementById('alertOverlay');
  const btnDismiss = document.getElementById('btnDismiss');
  const tabs = document.querySelectorAll('.tab');
  const inH = document.getElementById('inH');
  const inM = document.getElementById('inM');
  const inS = document.getElementById('inS');

  // --- Format ---
  function fmt(ms, showMs){
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    const cs = Math.floor((ms % 1000) / 10);
    let str = '';
    if(h > 0) str += String(h).padStart(2,'0') + ':';
    str += String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if(showMs) str += '<span class="ms">.' + String(cs).padStart(2,'0') + '</span>';
    return str;
  }

  // --- Render ---
  function render(){
    if(mode === 'stopwatch'){
      display.innerHTML = fmt(elapsed, true);
    } else {
      display.innerHTML = fmt(Math.max(0, remaining), remaining > 60000 ? false : true);
    }
  }

  // --- Tick ---
  function tick(){
    const now = performance.now();
    if(mode === 'stopwatch'){
      elapsed = elapsed + (now - startTs);
      startTs = now;
      render();
      rafId = requestAnimationFrame(tick);
    } else {
      remaining = remaining - (now - startTs);
      startTs = now;
      if(remaining <= 0){
        remaining = 0;
        render();
        stop();
        triggerAlert();
        return;
      }
      render();
      rafId = requestAnimationFrame(tick);
    }
  }

  // --- Start / Stop ---
  function start(){
    if(mode === 'timer' && !running && remaining <= 0){
      const h = Math.max(0, parseInt(inH.value)||0);
      const m = Math.max(0, parseInt(inM.value)||0);
      const s = Math.max(0, parseInt(inS.value)||0);
      timerTotal = (h*3600 + m*60 + s) * 1000;
      if(timerTotal <= 0) return;
      remaining = timerTotal;
    }
    running = true;
    startTs = performance.now();
    btnStart.textContent = 'Stop';
    btnStart.className = 'btn btn-stop';
    if(mode === 'stopwatch') btnLap.style.display = '';
    if(mode === 'timer') timerInput.classList.remove('visible');
    rafId = requestAnimationFrame(tick);
  }

  function stop(){
    running = false;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;
    btnStart.textContent = 'Start';
    btnStart.className = 'btn btn-start';
    if(mode === 'stopwatch') btnLap.style.display = 'none';
    render();
  }

  function reset(){
    stop();
    elapsed = 0;
    remaining = 0;
    lastLapElapsed = 0;
    laps = [];
    lapList.innerHTML = '';
    lapsSection.style.display = 'none';
    if(mode === 'timer') timerInput.classList.add('visible');
    render();
  }

  // --- Lap ---
  function addLap(){
    if(!running || mode !== 'stopwatch') return;
    const delta = elapsed - lastLapElapsed;
    lastLapElapsed = elapsed;
    laps.push({ total: elapsed, delta });
    lapsSection.style.display = '';
    const li = document.createElement('li');
    li.className = 'lap-item';
    li.innerHTML = '<span class="num">#' + laps.length + '</span><span>' + fmt(elapsed, true).replace(/<[^>]*>/g,'') + '</span><span class="delta">+' + fmt(delta, true).replace(/<[^>]*>/g,'') + '</span>';
    lapList.prepend(li);
  }

  // --- Alert ---
  function triggerAlert(){
    alertOverlay.classList.add('show');
    playBeep();
  }

  function dismissAlert(){
    alertOverlay.classList.remove('show');
    stopBeep();
    reset();
  }

  // --- Audio ---
  let beepInterval = null;
  function playBeep(){
    try {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function singleBeep(){
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }
      singleBeep();
      beepInterval = setInterval(singleBeep, 600);
      setTimeout(stopBeep, 10000);
    } catch(e){}
  }

  function stopBeep(){
    if(beepInterval){ clearInterval(beepInterval); beepInterval = null; }
  }

  // --- Mode Switch ---
  function switchMode(m){
    if(m === mode) return;
    reset();
    mode = m;
    tabs.forEach(t => {
      const isActive = t.dataset.mode === m;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive);
    });
    btnLap.style.display = 'none';
    if(m === 'timer'){
      timerInput.classList.add('visible');
      display.innerHTML = '00:00<span class="ms">.00</span>';
    } else {
      timerInput.classList.remove('visible');
      display.innerHTML = '00:00<span class="ms">.00</span>';
    }
  }

  // --- Events ---
  btnStart.addEventListener('click', () => running ? stop() : start());
  btnReset.addEventListener('click', reset);
  btnLap.addEventListener('click', addLap);
  btnDismiss.addEventListener('click', dismissAlert);
  tabs.forEach(t => t.addEventListener('click', () => switchMode(t.dataset.mode)));

  // Select all on input focus
  [inH, inM, inS].forEach(inp => {
    inp.addEventListener('focus', () => inp.select());
    inp.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); start(); }
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT') return;
    if(e.code === 'Space'){ e.preventDefault(); running ? stop() : start(); }
    if(e.key === 'r' || e.key === 'R') reset();
    if(e.key === 'l' || e.key === 'L') addLap();
  });

  render();
})();
</script>
